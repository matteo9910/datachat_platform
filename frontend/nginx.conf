server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — serve index.html per tutte le route client-side
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy verso il backend FastAPI
    # CRITICO per SSE (Server-Sent Events / streaming reasoning steps):
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;         # CRITICO per SSE
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';  # CRITICO per SSE — disabilita keep-alive chunked
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;             # CRITICO per SSE — disabilita buffering nginx
        chunked_transfer_encoding on;
    }

    # Health check endpoint nginx
    location /nginx-health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
